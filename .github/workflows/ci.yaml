name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: transport_test
          POSTGRES_USER: transport
          POSTGRES_PASSWORD: transport_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/transport_test
      SPRING_DATASOURCE_USERNAME: transport
      SPRING_DATASOURCE_PASSWORD: transport_test
      PKP_API_KEY: ci-not-used

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Allow Maven Wrapper execution
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw --batch-mode clean verify

      - name: Add coverage summary
        shell: bash
        run: |
          {
            echo "## JaCoCo test coverage"
            echo
            awk -F, '
              NR > 1 {
                line_missed += $8
                line_covered += $9
                branch_missed += $6
                branch_covered += $7
              }
              END {
                line_total = line_missed + line_covered
                branch_total = branch_missed + branch_covered
                line_percent = line_total ? 100 * line_covered / line_total : 0

                print "| Metric | Covered | Total | Coverage |"
                print "|---|---:|---:|---:|"
                printf "| Lines | %d | %d | %.2f%% |\n", line_covered, line_total, line_percent
                if (branch_total) {
                  printf "| Branches | %d | %d | %.2f%% |\n", branch_covered, branch_total, 100 * branch_covered / branch_total
                } else {
                  print "| Branches | 0 | 0 | N/A |"
                }
              }
            ' target/site/jacoco/jacoco.csv
            echo
            echo "<details>"
            echo "<summary>Coverage by class</summary>"
            echo
            echo "| Class | Lines | Line coverage | Branches | Branch coverage |"
            echo "|---|---:|---:|---:|---:|"
            awk -F, '
              NR > 1 {
                line_total = $8 + $9
                branch_total = $6 + $7
                line_percent = line_total ? 100 * $9 / line_total : 0
                branch_result = branch_total ? sprintf("%.2f%%", 100 * $7 / branch_total) : "N/A"

                printf "| `%s.%s` | %d/%d | %.2f%% | %d/%d | %s |\n",
                  $2, $3, $9, line_total, line_percent, $7, branch_total, branch_result
              }
            ' target/site/jacoco/jacoco.csv
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
