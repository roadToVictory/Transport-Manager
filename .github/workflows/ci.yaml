name: CI

on:
    push:
        branches:
        - *
    pull_request:
        branches:
        - main
permissions:
    contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
            POSTGRES_DB: transport_test
            POSTGRES_USER: transport
            POSTGRES_PASSWORD: transport_test
        ports:
          - 5432:5432
        options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/transport_test
      SPRING_DATASOURCE_USERNAME: transport
      SPRING_DATASOURCE_PASSWORD: transport_test
      PKP_API_KEY: ci-not-used

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Allow Maven Wrapper execution
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw clean verify
